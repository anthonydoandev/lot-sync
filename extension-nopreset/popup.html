<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html {
      overflow: hidden;
      height: 300px;
      width: 350px;
      margin: 0;
      padding: 0;
    }
    body {
      width: 350px;
      height: 300px;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f5f5;
      font-feature-settings: "rlig" 1, "calt" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #2c3e50;
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h3 {
      margin: 0;
      font-size: 16px;
    }
    .content {
      padding: 15px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .settings-toggle {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .settings-toggle:hover {
      opacity: 0.8;
    }
    .settings-section {
      display: none;
      background: #ecf0f1;
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
    }
    .settings-section.show {
      display: block;
    }
    .settings-section label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      margin-bottom: 3px;
    }
    .settings-section input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .settings-section input:focus {
      outline: none;
      border-color: #3498db;
    }
    .btn-settings-save {
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-settings-save:hover {
      background: #229954;
    }
    .settings-saved {
      color: #27ae60;
      font-size: 11px;
      font-weight: bold;
      margin-left: 8px;
      display: none;
    }
    .auth-section {
      background: #eaf2f8;
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
    }
    .auth-section label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      margin-bottom: 3px;
    }
    .auth-section input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .auth-section input:focus {
      outline: none;
      border-color: #3498db;
    }
    .auth-logged-in {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-logged-in span {
      font-size: 12px;
      color: #333;
      font-weight: bold;
    }
    .btn-logout {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-logout:hover {
      background: #c0392b;
    }
    .btn-login {
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .btn-login:hover {
      background: #1a252f;
    }
    .create-lot-section {
      padding: 0;
    }
    .btn-create-lot {
      background: #8e44ad;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .btn-create-lot:hover {
      background: #7d3c98;
    }
    .btn-create-lot:disabled {
      background: #b39ddb;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      background: white;
      border-radius: 4px;
      font-size: 11px;
      text-align: center;
      color: #666;
      display: none;
    }
    .status.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h3>Razor ERP Auto-Fill</h3>
    <button class="settings-toggle" id="settingsToggle" title="Settings">&#9881;</button>
  </div>

  <div class="settings-section" id="settingsSection">
    <label>Supabase URL</label>
    <input type="text" id="supabaseUrl" placeholder="https://your-project.supabase.co">
    <label>Anon Key</label>
    <input type="text" id="supabaseAnonKey" placeholder="eyJhbGciOiJI...">
    <div style="display: flex; align-items: center;">
      <button class="btn-settings-save" id="saveSettingsBtn">Save Settings</button>
      <span class="settings-saved" id="settingsSaved">Saved!</span>
    </div>
  </div>

  <div class="auth-section" id="authSection">
    <div id="authLoggedOut">
      <label>Username</label>
      <input type="text" id="authUsername" placeholder="Username" autocapitalize="off" autocorrect="off">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password">
      <button class="btn-login" id="loginBtn">Login</button>
    </div>
    <div id="authLoggedIn" style="display: none;">
      <div class="auth-logged-in">
        <span id="authDisplayName"></span>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="create-lot-section" id="createLotSection" style="display: none;">
      <button class="btn-create-lot" id="createLotBtn">Create Lot from Page</button>
      <div id="createLotStatus" class="status" style="margin-top: 8px;"></div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
