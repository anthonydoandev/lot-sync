<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html {
      overflow: hidden;
      height: 580px;
      width: 400px;
      margin: 0;
      padding: 0;
    }
    body {
      width: 400px;
      height: 580px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="header">
    <h3>Razor ERP Auto-Fill</h3>
    <div class="header-buttons">
      <button class="header-btn" id="sidePanelToggle" title="Open Side Panel">&#9699;</button>
      <button class="header-btn" id="settingsToggle" title="Settings">&#9881;</button>
    </div>
  </div>

  <div class="settings-section" id="settingsSection">
    <label>Supabase URL</label>
    <input type="text" id="supabaseUrl" placeholder="https://your-project.supabase.co">
    <label>Anon Key</label>
    <input type="text" id="supabaseAnonKey" placeholder="eyJhbGciOiJI...">
    <div style="display: flex; align-items: center;">
      <button class="btn-settings-save" id="saveSettingsBtn">Save Settings</button>
      <span class="settings-saved" id="settingsSaved">Saved!</span>
    </div>
  </div>

  <div class="auth-section" id="authSection">
    <div id="authLoggedOut">
      <label>Username</label>
      <input type="text" id="authUsername" placeholder="Username" autocapitalize="off" autocorrect="off">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password">
      <button class="btn-login" id="loginBtn">Login</button>
    </div>
    <div id="authLoggedIn" style="display: none;">
      <div class="auth-logged-in">
        <span id="authDisplayName"></span>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="create-lot-section" id="createLotSection" style="display: none;">
      <button class="btn-create-lot" id="createLotBtn">Create Lot from Page</button>
      <div id="createLotStatus" class="status" style="margin-top: 6px;"></div>
    </div>

    <div class="quick-fill">
      <h4>Presets</h4>
      <div class="preset-buttons">
        <button class="preset-btn grade-d" data-preset="gradeD_noHDD">GRADE D (NO HDD)</button>
        <button class="preset-btn grade-f" data-preset="gradeF_noHDD">GRADE F (NO HDD)</button>
        <button class="preset-btn grade-d" data-preset="gradeD_yesHDD">GRADE D (HDD)</button>
        <button class="preset-btn grade-f" data-preset="gradeF_yesHDD">GRADE F (HDD)</button>
      </div>

      <div id="savedPresetsDivider" class="saved-presets-divider" style="display: none;">Saved Presets</div>
      <div id="userPresetButtons" class="user-preset-buttons"></div>
      <button id="newPresetBtn" class="new-preset-btn">+ New Preset</button>

      <div id="presetManager" class="preset-manager">
        <h4 id="presetManagerTitle">New Preset</h4>
        <div class="form-row" style="margin-bottom: 6px;">
          <label>Name:</label>
          <input type="text" id="presetName" placeholder="My Preset">
        </div>
        <div class="form-row" style="margin-bottom: 6px;">
          <label>Category:</label>
          <select id="presetCategory">
            <option value="desktop">Desktops</option>
            <option value="laptop">Laptops</option>
            <option value="hardDrive">Hard Drives</option>
            <option value="lcdDisplay">LCD Displays</option>
          </select>
        </div>
        <button id="scanPresetBtn" class="btn btn-scan" style="width: 100%; margin-bottom: 8px;">Scan from Page</button>
        <div id="presetManagerFields" class="template-form"></div>
        <div class="preset-manager-actions">
          <button id="savePresetBtn" class="btn btn-save">Save Preset</button>
          <button id="cancelPresetBtn" class="btn btn-clear">Cancel</button>
          <button id="deletePresetBtn" class="btn-delete-preset" style="display: none;">Delete</button>
        </div>
      </div>
    </div>

    <div class="section-toggle" id="masterItemToggle">
      <h4>Master Item Template</h4>
      <span class="toggle-arrow" id="masterItemArrow">&#9654;</span>
    </div>
    <div class="master-item-section" id="masterItemSection">
      <div class="action-buttons">
        <button class="btn btn-save" id="miSaveBtn">Save</button>
        <button class="btn btn-master-fill" id="miFillBtn">Fill Master (Ctrl+Shift+M)</button>
        <button class="btn btn-clear" id="miClearBtn">Clear</button>
      </div>
      <div class="template-form" id="mi-form-fields"></div>
    </div>

    <div class="custom-template">
      <h4>Custom Template</h4>
      <div class="form-row" style="margin-bottom: 8px;">
        <label>Category:</label>
        <select id="templateCategory">
          <option value="desktop">Desktops</option>
          <option value="laptop">Laptops</option>
          <option value="hardDrive">Hard Drives</option>
          <option value="lcdDisplay">LCD Displays</option>
        </select>
      </div>
      <div class="action-buttons">
        <button class="btn btn-save" data-action="save">Save</button>
        <button class="btn btn-fill" data-action="fill">Fill (Ctrl+Shift+F)</button>
        <button class="btn btn-clear" data-action="clear">Clear</button>
      </div>
      <div class="template-form" id="form-fields"></div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
